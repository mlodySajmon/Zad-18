<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Przykłady jQuery</title>

<!-- Dołączenie biblioteki jQuery -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<style>

body{
    font-family: Arial;
}

#banner-message{
    display:none;
    background:yellow;
    padding:10px;
    margin-top:10px;
}

#box{
    width:100px;
    height:100px;
    background:red;
    margin-top:10px;
}

#panel{
    display:none;
    background:#ddd;
    padding:10px;
    margin-top:10px;
}

#weather-temp{
    margin-top:10px;
    font-size:20px;
}

</style>

<script>
$(document).ready(function(){

// 1. Manipulacja DOM – zmiana tekstu przycisku
$("button.continue").click(function(){
    $("button.continue").html("Next Step...");
});


// 2. Obsługa zdarzeń – pokazanie ukrytej wiadomości
var hiddenBox = $("#banner-message");

$("#button-container button").on("click", function(){
    hiddenBox.show();
});


// 3. Animacja slideToggle
$("#flip").click(function(){
    $("#panel").slideToggle();
});


// 4. Animacja fadeOut
$("#fadeBtn").click(function(){
    $("#box").fadeOut();
});


// 5. AJAX – pobranie temperatury i wyświetlenie jej
$("#weatherBtn").click(function(){

    $.ajax({
        url: "/api/getWeather",
        data: {
            zipcode: 97201
        },

        success: function(result){
            $("#weather-temp").html("<strong>" + result + "</strong> °C");
        },

        // jeśli nie ma serwera – pokaż przykładową temperaturę
        error: function(){
            var temp = 22;
            $("#weather-temp").html("<strong>" + temp + "</strong> °C");
        }

    });

});

});
</script>

</head>

<body>

<h2>Przykłady jQuery</h2>

<!-- Operacja 1 -->
<button class="continue">Continue</button>

<br><br>

<!-- Operacja 2 -->
<div id="button-container">
    <button>Kliknij mnie</button>
</div>

<div id="banner-message">
Ukryta wiadomość została pokazana!
</div>

<br>

<!-- Operacja 3 -->
<button id="flip">Pokaż / Ukryj panel</button>

<div id="panel">
Panel rozwijany przy pomocy slideToggle()
</div>

<br>

<!-- Operacja 4 -->
<button id="fadeBtn">Ukryj czerwony kwadrat</button>

<div id="box"></div>

<br>

<!-- Operacja 5 -->
<button id="weatherBtn">Pobierz temperaturę</button>

<div id="weather-temp"></div>

</body>
</html>
